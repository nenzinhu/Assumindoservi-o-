<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>Assunção de Serviço</title>

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: #64748b;
            text-transform: uppercase;
        }

        .row {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 10px;
            align-items: end;
            margin-bottom: 5px;
        }

        input, select {
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            transition: all 0.3s;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus, select:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .viatura-input {
            display: flex;
            align-items: center;
            background: #e2e8f0;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
        }

        .viatura-input span {
            padding: 0 12px;
            font-weight: bold;
            color: var(--primary);
        }

        .viatura-input input {
            border: none;
            flex-grow: 1;
            border-radius: 0 6px 6px 0;
        }

        button {
            margin-top: 15px;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--secondary);
        }

        #resultado-container {
            margin-top: 20px;
            display: none;
        }

        #resultado {
            white-space: pre-line;
            background: #f1f5f9;
            padding: 15px;
            border-left: 5px solid var(--primary);
            border-radius: 4px;
            font-family: monospace;
        }

        .btn-copy { background: #10b981; }
        .btn-whats { background: #25D366; }
    </style>
</head>

    <script>
        function formatarNome(input) {
            let valor = input.value.toLowerCase();
            input.value = valor.replace(/\b\w/g, l => l.toUpperCase());
        }

        function toggleManual(selectId, inputId) {
            const select = document.getElementById(selectId);
            const input = document.getElementById(inputId);
            input.style.display = select.value === "MANUAL" ? "block" : "none";
        }

        function coletarPoliciais(grupo) {
            let lista = [];
            for (let i = 1; i <= 3; i++) {
                const grad = document.getElementById(`grad${grupo}_${i}`).value;
                const nome = document.getElementById(`nome${grupo}_${i}`).value.trim();
                if (nome !== "") lista.push(`${grad} ${nome}`);
            }
            return lista.join(" / ");
        }
    </script>
